name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # L5 FIX: secret scanning runs before lint so a committed credential blocks
  # the pipeline immediately. trufflehog scans only the branch delta on PRs
  # and the last two commits on direct pushes — fast enough for CI.
  secret-scan:
    name: Secret scan (trufflehog)
    runs-on: ubuntu-latest
    steps:
      # checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0  # full history required for branch-delta scanning

      - name: Scan for secrets
        # trufflehog v3.95.5 — pinned SHA to prevent supply-chain attack.
        # @main was the only unpinned action in this workflow; all others are
        # SHA-pinned. A compromised @main would execute arbitrary code in the
        # CI runner with full access to all repository secrets.
        # To update: check https://github.com/trufflesecurity/trufflehog/releases
        # get the SHA for the desired tag with:
        #   git ls-remote https://github.com/trufflesecurity/trufflehog.git "refs/tags/v3.x.y"
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51
        with:
          path: ./
          # On push:          base=commit-before-push, head=commit-after-push
          # On pull_request:  base=PR-target-SHA,      head=PR-source-SHA
          # Using branch names (e.g. default_branch) resolves to HEAD on direct
          # pushes, making base == head and causing TruffleHog to error out.
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after }}
          extra_args: --only-verified

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      # checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # setup-python v5.3.0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  # ── H-17 FIX: static type checking ────────────────────────────────────────
  # mypy --strict on the analyst_copilot package catches the class of bugs
  # found in H-08 (property write), H-09 (bare except), and H-12 (wrong
  # attribute path) at zero runtime cost before they reach the test suite.
  # Runs after lint (formatting must be clean before type-checking) and in
  # parallel with the test job — does not block tests, but both must pass
  # for docker-build to proceed.
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      # checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # setup-python v5.3.0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies and mypy
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          # mypy 1.10.x — latest stable at time of pinning.
          # Also install stubs for packages that ship separate type information.
          # P3-10 FIX: removed types-pyaudio — PyAudio is an audio I/O library
          # with no relation to this project. Copy-paste artifact from another
          # project's CI config. Removing it avoids installing C-extension stubs
          # on every typecheck run and eliminates a potential stub conflict source.
          pip install \
            mypy==1.10.0 \
            types-redis \
            types-tqdm \
            pandas-stubs

      - name: Run mypy
        # --explicit-package-bases tells mypy to treat the repo root as the
        # package root, so analyst_copilot/observability.py is resolved as
        # analyst_copilot.observability only — never as the bare "observability".
        # MYPYPATH=analyst_copilot caused the duplicate-module error because it
        # added analyst_copilot/ to the search path, making every file visible
        # under both its qualified name and its bare filename simultaneously.
        run: |
          mypy analyst_copilot/ \
            --strict \
            --ignore-missing-imports \
            --explicit-package-bases \
            --exclude 'analyst_copilot/__init__\.py'

  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # H-16 FIX: add PostgreSQL 16 service matching the production stack.
      # Previously the test job used DATABASE_URL=sqlite:///./data/test.db.
      # SQLite and PostgreSQL differ on window functions, CTEs, DATE_TRUNC,
      # INTERVAL arithmetic, RETURNING, JSON operators, and type casting
      # semantics — bugs that pass SQLite in CI can fail PostgreSQL in prod.
      # The test suite now runs against both engines:
      #   - PRIMARY_DATABASE_URL → PostgreSQL (matches production)
      #   - SQLITE_DATABASE_URL  → SQLite (for unit tests that don't need PG)
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: analyst_copilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: development
      LLM_PROVIDER: groq
      # M7 NOTE: test-key-ci is intentionally invalid. All LLM call-sites in
      # the test suite must be mocked (unittest.mock.AsyncMock / pytest-httpx).
      # Any test that reaches a real Groq HTTP call will 401 immediately,
      # making unmocked LLM paths visible as failures rather than passing silently.
      GROQ_API_KEY: test-key-ci
      API_KEY: ""
      REDIS_URL: redis://localhost:6379/0
      FAISS_INDEX_PATH: ./data/faiss_index/ins_prod_v3.faiss
      # M2 fix reflected: cache is now JSON, not pickle.
      EMBED_CACHE_PATH: ./data/faiss_index/embed_cache.json
      ALLOWED_ORIGINS: "http://localhost:3000"
      # H-16 FIX: PRIMARY_DATABASE_URL points at the PostgreSQL service above.
      # Tests that exercise dialect-sensitive paths (execute_sql, validate_sql,
      # _make_readonly_engine) are parameterised over both URLs so dialect bugs
      # surface in CI rather than after deployment to the PostgreSQL production stack.
      DATABASE_URL: "postgresql://ci_user:ci_password@localhost:5432/analyst_copilot_test"
      # SQLite URL retained for unit tests that don't require a live PG connection
      # (e.g. in-memory schema validation, DataFrameStore, SessionStore tests).
      SQLITE_DATABASE_URL: "sqlite:///./data/test.db"

    steps:
      # checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # setup-python v5.3.0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # M11 FIX: create data/ so SQLite can open data/test.db — the directory
      # is not committed to the repo.
      - name: Create data directories
        run: mkdir -p data/faiss_index data/lt_memory data/files

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      # L6 FIX: coverage gate set to the measured baseline (38%).
      # Raise by ~5 pp per sprint as new test files land:
      #   38% → 50%  add test_prompts.py + test_dataframe_store.py
      #   50% → 65%  add test_retrieval.py
      #   65% → 70%  add test_orchestrator.py (happy paths + mocked LLM)
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --asyncio-mode=auto \
            --cov=analyst_copilot \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=38

      - name: Upload coverage report
        if: always()
        # upload-artifact v4.4.3
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload pytest cache
        if: always()
        # upload-artifact v4.4.3
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: pytest-cache
          path: .pytest_cache/

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    # H-17 FIX: require typecheck to pass alongside test before building the
    # image.  Previously only `test` was a prerequisite — mypy errors would
    # not block the image build.
    needs: [test, typecheck]

    steps:
      # checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Docker Buildx
        # setup-buildx-action v3.7.1
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349

      - name: Build image (no push)
        # build-push-action v6.9.0
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75
        with:
          context: .
          push: false
          tags: analyst-copilot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max